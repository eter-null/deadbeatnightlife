<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050505">
  <title>deadbeat nightlife</title>

  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Special+Elite&family=VT323&display=swap" rel="stylesheet">

  <style>
    /* ── reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #050505;
      --blood:  #8b0000;
      --red:    #c41111;
      --text:   #d0c2b2;
      --muted:  #3e2e28;
      --dim:    #1a0a0a;
    }

    /* ── body ── */
    html, body { min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Special Elite', monospace;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* film grain */
    body::after {
      content: '';
      position: fixed; inset: -50%;
      width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.74' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
      animation: grain 7s steps(8) infinite;
      pointer-events: none; z-index: 9999; opacity: 0.38;
    }
    @keyframes grain {
      0%  { transform: translate(0,0); }      14% { transform: translate(-5%,-4%); }
      28% { transform: translate(-10%,6%); }  42% { transform: translate(5%,-9%); }
      57% { transform: translate(-4%,14%); }  71% { transform: translate(-9%,4%); }
      85% { transform: translate(13%,0); }   100% { transform: translate(0,9%); }
    }

    /* scanlines */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background: repeating-linear-gradient(
        0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.045) 2px, rgba(0,0,0,0.045) 4px
      );
    }

    /* spark layer */
    .spark-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9500; overflow: hidden; }

    .spark {
      position: absolute; border-radius: 50%; pointer-events: none;
      animation: spark-out var(--dur,1s) ease-out forwards;
    }
    @keyframes spark-out {
      0%  { opacity:1;   transform: scale(1)   translate(0,0); }
      60% { opacity:0.5; }
      100%{ opacity:0;   transform: scale(0.2) translate(var(--dx,0),var(--dy,0)); }
    }

    .cursor-sym {
      position: fixed; font-size: 10px; color: var(--blood);
      pointer-events: none; z-index: 9500;
      animation: sym-fade 0.9s ease-out forwards;
      transform: translate(-50%,-50%); line-height: 1;
    }
    @keyframes sym-fade {
      0%  { opacity:1; transform: translate(-50%,-50%) scale(1); }
      100%{ opacity:0; transform: translate(-50%,-80%) scale(0.4); }
    }

    /* ── site container ── */
    .site {
      max-width: 440px;
      margin: 0 auto;
      position: relative; z-index: 2;
      border-left: 1px solid #1a0000;
      border-right: 1px solid #1a0000;
      min-height: 100dvh;
    }

    /* ── ALBUM SECTION (top of page) ── */
    .album-section {
      background: #000;
      padding: 22px 22px 0;
      display: flex; flex-direction: column; align-items: center;
    }

    .album-outer { position: relative; display: inline-block; }

    .album-aura {
      position: absolute; inset: -14px;
      background: radial-gradient(ellipse at center, rgba(100,0,0,0.38) 0%, transparent 68%);
      animation: aura 3.2s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }
    @keyframes aura {
      0%,100% { opacity:0.5; transform:scale(1); }
      50%     { opacity:1;   transform:scale(1.06); }
    }

    .album-frame {
      position: relative; z-index: 1;
      width: 290px; height: 290px;
      border: 2px solid var(--blood);
      box-shadow:
        0 0 0 1px #000,
        0 0 0 3px #200000,
        0 0 26px rgba(139,0,0,0.55),
        inset 0 0 22px rgba(0,0,0,0.6);
    }
    /* inner scratch border */
    .album-frame::before {
      content: ''; position: absolute; inset: 4px;
      border: 1px solid rgba(139,0,0,0.2);
      z-index: 2; pointer-events: none;
    }

    .album-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      filter: contrast(1.06) saturate(0.8);
      -webkit-user-drag: none;
    }

    /* corner crosses on album */
    .cx {
      position: absolute; font-size: 14px; z-index: 3;
      color: var(--red); line-height: 1;
      text-shadow: 0 0 8px var(--blood);
      animation: blink 2s step-end infinite;
    }
    .cx.tl { top:-9px;    left:-9px;    animation-delay:0s; }
    .cx.tr { top:-9px;    right:-9px;   animation-delay:0.6s; }
    .cx.bl { bottom:-9px; left:-9px;    animation-delay:1.2s; }
    .cx.br { bottom:-9px; right:-9px;   animation-delay:1.8s; }

    /* NOW PLAYING caption under art */
    .now-playing {
      font-family: 'VT323', monospace;
      font-size: 0.74rem;
      color: var(--blood);
      letter-spacing: 7px;
      text-transform: uppercase;
      animation: blink 1.1s step-end infinite;
      padding: 14px 0 0;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

    /* ── SONG INFO ── */
    .song-info {
      background: #000;
      border-bottom: 1px solid #1a0000;
      padding: 10px 16px 18px;
      text-align: center;
    }

    .band-name {
      font-family: 'Special Elite', serif;
      font-size: clamp(2.1rem, 10.5vw, 2.8rem);
      color: var(--blood);
      line-height: 1.25;
      display: block;
      letter-spacing: 3px;
      text-transform: lowercase;
      text-shadow:
        2px 2px 0 #1a0000,
        0 0 20px rgba(139,0,0,0.75),
        0 0 48px rgba(139,0,0,0.35);
    }

    .song-title {
      display: block;
      position: relative;
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(0.88rem, 4.5vw, 1.1rem);
      color: #e8ddd4;
      letter-spacing: 2px;
      margin-top: 10px;
      text-shadow:
        1px 1px 0 #1a0000,
        0 0 16px rgba(255,255,255,0.18);
    }
    .song-title::before {
      content: attr(data-text);
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      color: rgba(255,0,55,0.65);
      clip-path: polygon(0 20%, 100% 20%, 100% 38%, 0 38%);
      animation: glitch-a 5s infinite;
      font-family: inherit; font-size: inherit; letter-spacing: inherit;
      pointer-events: none;
    }
    .song-title::after {
      content: attr(data-text);
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      color: rgba(0,195,255,0.42);
      clip-path: polygon(0 64%, 100% 64%, 100% 78%, 0 78%);
      animation: glitch-b 5s infinite;
      font-family: inherit; font-size: inherit; letter-spacing: inherit;
      pointer-events: none;
    }
    @keyframes glitch-a {
      0%,93%  { opacity:0; transform:translateX(0); }
      94%     { opacity:0.9; transform:translateX(-4px); }
      95%     { opacity:0;   transform:translateX(4px); }
      96%     { opacity:0.6; transform:translateX(-2px); }
      97%,100%{ opacity:0; }
    }
    @keyframes glitch-b {
      0%,93%  { opacity:0; transform:translateX(0); }
      94%     { opacity:0.6; transform:translateX(4px); }
      95%     { opacity:0;   transform:translateX(-4px); }
      96%     { opacity:0.4; transform:translateX(2px); }
      97%,100%{ opacity:0; }
    }

    /* ── BLOOD DRIPS ── */
    .blood-drips {
      display: flex; justify-content: center;
      align-items: flex-start; gap: 10px;
      height: 28px; overflow: visible;
      background: #000;
    }
    .drip {
      width: 4px;
      background: linear-gradient(to bottom, var(--blood), #e81818);
      border-radius: 0 0 4px 4px;
      animation: drip-fall var(--d,2s) ease-in var(--dd,0s) infinite;
    }
    @keyframes drip-fall {
      0%  { height:4px;  opacity:1; }
      65% { height:26px; opacity:1; }
      85% { height:26px; opacity:0.4; }
      100%{ height:4px;  opacity:0; }
    }

    /* ── LYRICS ── */
    .lyrics-section {
      position: relative;
      min-height: 200px;
      padding: 8px 0;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid #1a0000;
    }

    /* tap overlay */
    .tap-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(5,5,5,0.94);
      z-index: 20; cursor: pointer;
      transition: opacity 0.55s;
    }
    .tap-overlay.gone { opacity:0; pointer-events:none; }

    .tap-icon {
      font-size: 3rem; color: var(--blood); line-height: 1;
      animation: hb 1.2s ease-in-out infinite;
    }
    @keyframes hb {
      0%,100%{ transform:scale(1); }
      15%    { transform:scale(1.22); }
      30%    { transform:scale(0.88); }
      45%    { transform:scale(1.12); }
    }
    .tap-label {
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      color: var(--blood);
      letter-spacing: 7px;
      animation: blink 1.3s step-end infinite;
      margin-top: 10px;
    }

    /* 3-line lyric display */
    .lyric-display { width: 100%; text-align: center; padding: 0 14px; }

    .lyric-line {
      padding: 9px 14px; line-height: 1.55;
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    .lyric-line.prev,
    .lyric-line.next {
      font-family: 'Special Elite', serif;
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.45;
    }
    .lyric-line.curr {
      font-family: 'Special Elite', serif;
      font-size: 1.08rem;
      color: #f0e6dc;
      text-shadow: 0 0 16px rgba(139,0,0,0.65), 0 0 30px rgba(139,0,0,0.22);
    }

    .lyric-sep {
      text-align: center; color: #1e0606;
      font-size: 7px; letter-spacing: 8px; padding: 1px 0;
      font-family: 'VT323', monospace;
    }

    /* slide-out / slide-in transitions */
    .lyric-line.exiting { animation: ly-exit 0.22s ease-in forwards; }
    @keyframes ly-exit {
      from { opacity:var(--opa,1); transform:translateY(0); }
      to   { opacity:0; transform:translateY(-10px); }
    }
    .lyric-line.entering { animation: ly-enter 0.3s ease-out forwards; }
    @keyframes ly-enter {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:var(--opa,1); transform:translateY(0); }
    }

    /* ── PLAYER ── */
    .player-section {
      padding: 14px 16px;
      border-bottom: 1px solid #1a0000;
    }

    audio { display: none; }

    .player-row { display: flex; align-items: center; gap: 10px; }

    /* chunky Win9x / Geocities raised button */
    .play-btn {
      flex-shrink: 0;
      width: 54px;
      height: 38px;
      background: #1a0a0a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      /* raised 3D border */
      border: 2px solid #000;
      border-top-color: #5a3838;
      border-left-color: #5a3838;
      border-right-color: #0a0202;
      border-bottom-color: #0a0202;
      box-shadow:
        inset 1px 1px 0 #3a1a1a,
        1px 1px 0 #000;
    }
    .play-btn:active {
      border-top-color: #0a0202;
      border-left-color: #0a0202;
      border-right-color: #5a3838;
      border-bottom-color: #5a3838;
      box-shadow: inset 1px 1px 0 #0c0404;
      background: #120606;
    }
    /* looks "held down" while music plays */
    .play-btn.is-playing {
      border-top-color: #0a0202;
      border-left-color: #0a0202;
      border-right-color: #5a3838;
      border-bottom-color: #5a3838;
      box-shadow: inset 1px 1px 0 #0c0404;
      background: #120606;
    }

    /* pixel-style icons (no unicode play triangle) */
    .play-btn .ico { display: flex; align-items: center; justify-content: center; }
    .play-btn .ico-play .tri {
      width: 0; height: 0;
      border-style: solid;
      border-width: 7px 0 7px 11px;
      border-color: transparent transparent transparent #c82222;
      margin-left: 3px;
    }
    .play-btn .ico-pause {
      display: none;
      gap: 5px;
    }
    .play-btn .ico-pause b {
      display: block;
      width: 4px;
      height: 14px;
      background: #c82222;
      font-weight: normal;
    }
    .play-btn.is-playing .ico-play { display: none; }
    .play-btn.is-playing .ico-pause { display: flex; }

    .progress-track {
      flex:1; height: 8px;
      background: #0c0202;
      border: 1px solid #2a0000;
      cursor: pointer; touch-action: none; position: relative;
    }
    .progress-track::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background: repeating-linear-gradient(
        90deg, transparent 0, transparent 4px,
        rgba(255,255,255,0.02) 4px, rgba(255,255,255,0.02) 5px
      );
    }
    .progress-fill {
      height:100%;
      background: linear-gradient(90deg, var(--blood), var(--red));
      width:0%; position:relative;
      transition: width 0.1s linear;
    }
    .progress-fill::after {
      content:''; position:absolute;
      right:-2px; top:-3px;
      width:7px; height:14px;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }

    .time-ctr {
      flex-shrink: 0;
      font-family: 'VT323', monospace; font-size: 1rem;
      color: var(--muted); min-width: 42px; text-align: right;
    }

    /* ── FOOTER ── */
    .site-footer {
      padding: 18px 16px 28px;
      text-align: center;
    }

    .footer-gifs {
      display: flex; justify-content: center;
      align-items: center; gap: 12px;
      margin-bottom: 14px;
    }
    .footer-gifs img {
      height: 34px; width: auto;
      image-rendering: pixelated;
    }

    /* CSS blingee fallback cross spinner */
    .blingee-cross {
      font-size: 26px; color: var(--blood);
      animation: cross-pulse 2s ease-in-out infinite;
      text-shadow: 0 0 6px var(--blood);
      display: inline-block; line-height: 1;
    }
    @keyframes cross-pulse {
      0%,100%{ transform:scale(1); opacity:0.6; }
      50%    { transform:scale(1.18); opacity:1; text-shadow:0 0 14px #ff2222; }
    }

    .footer-band {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: 1.1rem;
      color: var(--blood);
      text-shadow: 0 0 10px rgba(139,0,0,0.5);
    }

    .v-counter {
      display: inline-block;
      font-family: 'VT323', monospace;
      font-size: 0.78rem; color: #3a2828;
      letter-spacing: 2px;
      border: 1px solid #1a0808;
      padding: 2px 8px; margin-top: 10px;
    }

    .badges {
      display: flex; justify-content: center; gap: 5px; margin-top: 12px;
    }
    .badge {
      font-family: 'VT323', monospace; font-size: 8px;
      background: #040000; border: 1px solid #180000;
      padding: 3px 5px; color: #2e0000;
      letter-spacing: 1px; text-transform: uppercase;
    }

    .copyright {
      display: block;
      font-family: 'VT323', monospace;
      font-size: 0.58rem; color: #180808;
      letter-spacing: 2px; margin-top: 14px;
    }
  </style>
</head>

<div class="spark-layer" id="sparkLayer"></div>

  <div class="blood-drips">

  <!-- ══ LYRICS ══ -->
  <section class="lyrics-section" id="lyricsSection">

      <div class="tap-label">tap to play</div>

  </section>

  <!-- ══ PLAYER ══ -->
  <section class="player-section">

    <div class="player-row">
      <button type="button" class="play-btn" id="playBtn" aria-label="Play">
        <span class="ico ico-play" aria-hidden="true"><span class="tri"></span></span>
        <span class="ico ico-pause" aria-hidden="true"><b></b><b></b></span>
      </button>
      <div class="progress-track" id="pTrack">
        <div class="progress-fill" id="pFill"></div>
      </div>
      <div class="time-ctr" id="timeCtr">0:00</div>
    </div>
  </section>

  <!-- ══ FOOTER ══ -->
  <footer class="site-footer">
    <div class="footer-gifs">
      <img src="https://media.tenor.com/CQCiIWMuiksAAAAi/black-rose.gif"
           onerror="this.style.display='none'" alt="">
      <span class="blingee-cross">✝</span>
      <img src="https://media.tenor.com/CQCiIWMuiksAAAAi/black-rose.gif"
           onerror="this.style.display='none'" alt="">
    </div>

    <div class="footer-band">deadbeat nightlife</div>

    <div class="v-counter">♥ visitors: <span id="vCount">13,666</span> ♥</div>

    <div class="badges">
      <div class="badge">emo 4ever</div>
      <div class="badge">under construction</div>
    </div>

    <span class="copyright">© deadbeat nightlife</span>
  </footer>

</div><!-- .site -->

  ];

  /* ── DOM ── */
  var audio    = document.getElementById('audio');
  var playBtn  = document.getElementById('playBtn');
  var pFill    = document.getElementById('pFill');
  var pTrack   = document.getElementById('pTrack');
  var timeCtr  = document.getElementById('timeCtr');
  var lPrev    = document.getElementById('lPrev');
  var lCurr    = document.getElementById('lCurr');
  var lNext    = document.getElementById('lNext');
  var tapOverlay = document.getElementById('tapOverlay');
  var sparkLayer = document.getElementById('sparkLayer');

  var started  = false;
  var lastIdx  = -2;
  var dragging = false;

  function setPlayingUI(playing) {
    if (playing) {
      playBtn.classList.add('is-playing');
      playBtn.setAttribute('aria-label', 'Pause');
    } else {
      playBtn.classList.remove('is-playing');
      playBtn.setAttribute('aria-label', 'Play');
    }
  }

  function fmt(s) {
    return Math.floor(s/60) + ':' + Math.floor(s%60).toString().padStart(2,'0');
  }

  function getLyricIdx(t) {
    var idx = -1;
    for (var i = 0; i < LRC.length; i++) {
      if (t >= LRC[i].t) idx = i; else break;
    }
    return idx;
  }

  /* ── playback ── */
  function startPlay() {
    if (!started) { started = true; tapOverlay.classList.add('gone'); }
    audio.play().then(function(){ setPlayingUI(true); }).catch(function(){});
  }

  tapOverlay.addEventListener('click', startPlay);
  tapOverlay.addEventListener('touchend', function(e){ e.preventDefault(); startPlay(); }, { passive: false });

  playBtn.addEventListener('click', function() {
    if (!started) { startPlay(); return; }
    if (audio.paused) { audio.play(); setPlayingUI(true); }
    else              { audio.pause(); setPlayingUI(false); }
  });

  audio.addEventListener('ended', function(){ setPlayingUI(false); });

  /* ── seek ── */
  function seekAt(cx) {
    if (!audio.duration) return;
    var r = pTrack.getBoundingClientRect();
    audio.currentTime = Math.max(0, Math.min(1, (cx - r.left) / r.width)) * audio.duration;
  }

  pTrack.addEventListener('mousedown',  function(e){ dragging=true; seekAt(e.clientX); });
  pTrack.addEventListener('touchstart', function(e){ dragging=true; seekAt(e.touches[0].clientX); }, { passive:true });
  document.addEventListener('mousemove',  function(e){ if(dragging) seekAt(e.clientX); });
  document.addEventListener('touchmove',  function(e){ if(dragging) seekAt(e.touches[0].clientX); }, { passive:true });
  document.addEventListener('mouseup',  function(){ dragging=false; });
  document.addEventListener('touchend', function(){ dragging=false; });

  /* ── time update ── */
  audio.addEventListener('timeupdate', function() {
    var t = audio.currentTime, d = audio.duration || 0;
    if (d > 0) pFill.style.width = (t/d*100) + '%';
    timeCtr.textContent = fmt(t);
    updateLyrics(t);
  });

  /* ── lyrics ── */
  function updateLyrics(t) {
    var idx = getLyricIdx(t);
    if (idx === lastIdx) return;
    lastIdx = idx;

    var prevTxt = '\u00a0', currTxt = '\u00a0', nextTxt = '\u00a0';
    if (idx < 0) {
      currTxt = '...';
      nextTxt = LRC[0] ? LRC[0].text : '\u00a0';
    } else {
      prevTxt = idx > 0              ? LRC[idx-1].text : '\u00a0';
      currTxt = LRC[idx].text;
      nextTxt = idx < LRC.length-1  ? LRC[idx+1].text : '\u00a0';
    }

    [lPrev, lCurr, lNext].forEach(function(el){ el.classList.remove('entering'); el.classList.add('exiting'); });

    setTimeout(function() {
      lPrev.textContent = prevTxt;
      lCurr.textContent = currTxt;
      lNext.textContent = nextTxt;
      lPrev.style.opacity = (prevTxt === '\u00a0') ? '0' : '';
      lNext.style.opacity = (nextTxt === '\u00a0') ? '0' : '';
      [lPrev, lCurr, lNext].forEach(function(el){ el.classList.remove('exiting'); el.classList.add('entering'); });
      setTimeout(function() {
        [lPrev, lCurr, lNext].forEach(function(el){ el.classList.remove('entering'); });
        if (prevTxt !== '\u00a0') lPrev.style.opacity = '';
        if (nextTxt !== '\u00a0') lNext.style.opacity = '';
      }, 320);
    }, 230);
  }

  /* ── sparkle trail ── */
  var COLORS = ['#8b0000','#c41111','#ff2020','#990000','#aa0000'];
  var GLYPHS  = ['✦','✝','♥','·','★'];
  var lastSpark = 0;

  function spawnSpark(x, y) {
    for (var i = 0; i < 3; i++) {
      var s = document.createElement('div');
      s.className = 'spark';
      var dx = (Math.random()-.5)*42, dy = (Math.random()-.5)*42;
      var dur = 0.7 + Math.random()*0.9, sz = 2 + Math.random()*4;
      s.style.cssText =
        'left:'+x+'px;top:'+y+'px;width:'+sz+'px;height:'+sz+'px;' +
        'background:'+COLORS[Math.floor(Math.random()*COLORS.length)]+';' +
        '--dx:'+dx+'px;--dy:'+dy+'px;--dur:'+dur+'s;';
      sparkLayer.appendChild(s);
      setTimeout(function(el){ el.remove(); }, (dur+0.15)*1000, s);
    }
  }

  function spawnGlyph(x, y) {
    var g = document.createElement('span');
    g.className = 'cursor-sym';
    g.textContent = GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
    g.style.left = x+'px'; g.style.top = y+'px';
    document.body.appendChild(g);
    setTimeout(function(){ g.remove(); }, 950);
  }

  document.addEventListener('mousemove', function(e) {
    var now = Date.now();
    if (now - lastSpark < 55) return;
    lastSpark = now;
    if (Math.random() < 0.5) spawnSpark(e.clientX, e.clientY);
    if (Math.random() < 0.18) spawnGlyph(e.clientX, e.clientY);
  });

  document.addEventListener('touchmove', function(e) {
    var now = Date.now();
    if (now - lastSpark < 40) return;
    lastSpark = now;
    spawnSpark(e.touches[0].clientX, e.touches[0].clientY);
    if (Math.random() < 0.3) spawnGlyph(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive:true });

  /* ambient sparkles */
  (function amb() {
    spawnSpark(Math.random()*window.innerWidth, Math.random()*window.innerHeight);
    setTimeout(amb, 400 + Math.random()*700);
  }());

  /* visitor counter */
  var vc = document.getElementById('vCount');
  if (vc) {
    var stored = parseInt(localStorage.getItem('dbn_vc') || '0', 10);
    var count  = 13666 + stored + Math.floor(Math.random()*7);
    localStorage.setItem('dbn_vc', count - 13666);
    vc.textContent = count.toLocaleString();
  }

}());
